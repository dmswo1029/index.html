        // 현재 시간 기준 영업 상태 확인
        function getOperatingStatus(hours) {
            const now = new Date();
            const day = now.getDay();
            const currentTime = now.getHours()  100 + now.getMinutes();

            let todayHours;
            if (day === 0) {
                todayHours = hours.sunday;
            } else if (day === 6) {
                todayHours = hours.saturday;
            } else {
                todayHours = hours.weekday;
            }

            if (todayHours === "휴무") {
                return { isOpen: false, text: "휴무" };
            }

            if (todayHours === "00:00 - 24:00") {
                return { isOpen: true, text: "24시간 영업" };
            }

            // 시간 파싱 (쉼표로 구분된 복수 시간대 지원)
            const timeRanges = todayHours.split(", ");
            for (const range of timeRanges) {
                const [start, end] = range.split(" - ");
                const [startHour, startMin] = start.split(":").map(Number);
                const [endHour, endMin] = end.split(":").map(Number);
                
                const startTime = startHour  100 + startMin;
                const endTime = endHour  100 + endMin;

                if (currentTime >= startTime && currentTime <= endTime) {
                    return { isOpen: true, text: "영업중" };
                }
            }

            return { isOpen: false, text: "영업종료" };
        }

        // 카드 생성 함수
        function createCard(cafeteria) {

            ).join('');

            const tagsHtml = cafeteria.tags.map(tag =>

            ).join('');

            return

                                    일요일: ${cafeteria.hours.sunday}
                                </div>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-icon">📋</div>
                            <div class="info-content">
                                <div class="info-label">현재 상태</div>
                                <div class="info-value">
                                    <span class="status-badge ${status.isOpen ? 'status-open' : 'status-closed'}">
                                        ${status.isOpen ? '🟢' : '🔴'} ${status.text}
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-icon">🍽️</div>
                            <div class="info-content">
                                <div class="info-label">대표 메뉴</div>
                                <ul class="menu-list">${menuHtml}</ul>
                            </div>
                        </div>
                        <div class="tags">${tagsHtml}</div>
                    </div>
                </div>
            ;

        // 카드 렌더링
        function renderCards(filter = 'all') {
            const grid = document.getElementById('cafeteriaGrid');

                ? cafeteriaData 
                : cafeteriaData.filter(c => c.category === filter);
            
            grid.innerHTML = filteredData.map(createCard).join('');
        }

        // 필터 버튼 이벤트
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderCards(this.dataset.filter);
            });
        });

        // 초기 렌더링
        renderCards();
