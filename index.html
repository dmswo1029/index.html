끼 또는 간식으로 좋은 분식집.", menu: [ { name: "떡볶이", price: 4000 }, { name: "순대", price: 4000 }, { name: "김밥", price: 3000 }, ], seedReviews: [ { rating: 4, text: "공강 시간에 빠르게 먹기 좋아요." }, ], }, { id: "r17", name: "그린샐러드바", category: "기타", address: "서울 성북구 하나로 9길 1", lat: 37.5886, lng: 127.0345, priceRange: "7,000 ~ 9,500원", description: "직접 토핑을 고르는 건강한 샐러드 전문점.", menu: [ { name: "닭가슴살샐러드", price: 8500 }, { name: "포케", price: 9000 }, ], seedReviews: [ { rating: 4, text: "재료가 신선하고 토핑 선택지가 다양해요." }, ], }, ]; /** * storage.js * localStorage 기반의 아주 단순한 "백엔드 대용" 레이어. * GitHub Pages처럼 별도 서버 없이 정적 호스팅만으로 동작해야 하는 * 과제 특성상, 모든 사용자/리뷰/북마크/혼잡도 데이터를 브라우저에 저장한다. * * 주의(README 참고): 비밀번호를 평문으로 저장하므로 실제 서비스에는 * 적합하지 않다. 과제용 데모 목적의 단순화임을 명시한다. */ const KEYS = { USERS: "kff_users", CURRENT_USER: "kff_current_user", REVIEWS: "kff_reviews", CONGESTION: "kff_congestion", BOOKMARKS: "kff_bookmarks", SEEDED: "kff_seeded_v1", }; const Storage = { _read(key, fallback) { try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; } catch (e) { console.error("Storage read error", key, e); return fallback; } }, _write(key, value) { localStorage.setItem(key, JSON.stringify(value)); }, getUsers() { return this._read(KEYS.USERS, {}); }, setUsers(users) { this._write(KEYS.USERS, users); }, getCurrentUser() { return this._read(KEYS.CURRENT_USER, null); }, setCurrentUser(username) { this._write(KEYS.CURRENT_USER, username); }, clearCurrentUser() { localStorage.removeItem(KEYS.CURRENT_USER); }, getReviews() { return this._read(KEYS.REVIEWS, {}); }, setReviews(reviews) { this._write(KEYS.REVIEWS, reviews); }, getCongestion() { return this._read(KEYS.CONGESTION, {}); }, setCongestion(congestion) { this._write(KEYS.CONGESTION, congestion); }, getBookmarks() { return this._read(KEYS.BOOKMARKS, {}); }, setBookmarks(bookmarks) { this._write(KEYS.BOOKMARKS, bookmarks); }, addReview(restaurantId, review) { const all = this.getReviews(); if (!all[restaurantId]) all[restaurantId] = []; all[restaurantId].unshift(review); this.setReviews(all); }, addCongestionReport(restaurantId, report) { const all = this.getCongestion(); if (!all[restaurantId]) all[restaurantId] = []; all[restaurantId].unshift(report); // 너무 길어지지 않도록 최근 20개만 보관 all[restaurantId] = all[restaurantId].slice(0, 20); this.setCongestion(all); }, toggleBookmark(username, restaurantId) { const all = this.getBookmarks(); if (!all[username]) all[username] = []; const idx = all[username].indexOf(restaurantId); if (idx >= 0) { all[username].splice(idx, 1); } else { all[username].push(restaurantId); } this.setBookmarks(all); return idx < 0; // true면 새로 추가된 것 }, isBookmarked(username, restaurantId) { const all = this.getBookmarks(); return !!(all[username] && all[username].includes(restaurantId)); }, getBookmarkIds(username) { const all = this.getBookmarks(); return all[username] || []; }, /** 최초 1회: 데모용 리뷰 시드 데이터를 깔아준다. */ seedIfNeeded() { if (this._read(KEYS.SEEDED, false)) return; const reviews = this.getReviews(); RESTAURANTS.forEach((r) => { if (!reviews[r.id]) reviews[r.id] = []; (r.seedReviews || []).forEach((sr, i) => { reviews[r.id].push({ id: `${r.id}-seed-${i}`, user: "익명학우", rating: sr.rating, text: sr.text, date: new Date(Date.now() - (i + 1) * 86400000).toISOString(), }); }); }); this.setReviews(reviews); this._write(KEYS.SEEDED, true); }, }; /** * auth.js * 회원가입 / 로그인 / 로그아웃을 담당하는 모듈. */ const Auth = { MIN_LEN: 4, validate(username, password) { if (!username || !password) { return "아이디와 비밀번호를 모두 입력해주세요."; } if (username.length < this.MIN_LEN || password.length < this.MIN_LEN) { return `아이디와 비밀번호는 ${this.MIN_LEN}자 이상이어야 합니다.`; } if (/\s/.test(username)) { return "아이디에는 공백을 사용할 수 없습니다."; } return null; }, signup(username, password) { const err = this.validate(username, password); if (err) return { ok: false, message: err }; const users = Storage.getUsers(); if (users[username]) { return { ok: false, message: "이미 사용 중인 아이디입니다." }; } users[username] = password; Storage.setUsers(users); Storage.setCurrentUser(username); return { ok: true }; }, login(username, password) { const users = Storage.getUsers(); if (!users[username] || users[username] !== password) { return { ok: false, message: "아이디 또는 비밀번호가 일치하지 않습니다." }; } Storage.setCurrentUser(username); return { ok: true }; }, logout() { Storage.clearCurrentUser(); }, getCurrentUser() { return Storage.getCurrentUser(); }, }; /** * app.js * 화면 렌더링과 사용자 상호작용을 담당하는 메인 애플리케이션 모듈. * * 설계 메모 * - 프레임워크 없이 템플릿 문자열 + innerHTML 로 렌더링한다. * - 검색창/리뷰 작성란처럼 "타이핑 중 포커스를 잃으면 안 되는" 요소는 * 해당 요소가 속한 작은 영역만 다시 그리고, 입력 이벤트 자체로는 * 상위 전체를 다시 그리지 않도록 분리했다 (updateGrid 등 참고). * - 사용자 입력 텍스트는 escapeHtml 로 이스케이프하여 화면이 깨지지 * 않도록 한다. */ const App = { state: { view: "list", // 'list' | 'bookmarks' category: "전체", query: "", buildingId: "", sort: "default", // 'default' | 'rating' | 'distance' activeId: null, // 상세 모달에서 보고 있는 식당 id draftRating: 0, // 작성 중인 리뷰 별점 draftText: "", // 작성 중인 리뷰 텍스트(재렌더 시 보존) reviewError: "", authMode: "login", // 'login' | 'signup' authError: "", }, init() { Storage.seedIfNeeded(); this.bindEvents(); this.renderRoot(); }, // ---------- 최상위 렌더 ---------- renderRoot() { const root = document.getElementById("app"); const user = Auth.getCurrentUser(); root.innerHTML = user ? this.mainTemplate() : this.authTemplate(); }, // ==================================================================== // 인증 화면 // ==================================================================== authTemplate() { const { authMode, authError } = this.state; return `

rid(); break; case "set-category": this.state.category = target.dataset.category; this.updateCategoryTabs(); this.updateGrid(); break; case "open-detail": this.openDetail(target.dataset.id); break; case "close-modal": if (e.target === target) this.closeModal(); break; case "toggle-bookmark": { const user = Auth.getCurrentUser(); Storage.toggleBookmark(user, target.dataset.id); if (this.state.activeId === target.dataset.id) this.updateModal(); this.updateGrid(); break; } case "report-congestion": { const user = Auth.getCurrentUser(); Storage.addCongestionReport(target.dataset.id, { id: `c-${Date.now()}`, user, level: target.dataset.level, time: new Date().toISOString(), }); this.updateModal(); this.updateGrid(); break; } case "set-star": this.state.draftRating = Number(target.dataset.star); this.updateModal(); break; } }); // 모달은 오버레이 바깥(=카드 바깥 영역) 클릭 시에도 닫히도록 root.addEventListener("click", (e) => { if (e.target.classList.contains("modal-overlay")) this.closeModal(); }); root.addEventListener("submit", (e) => { const form = e.target.closest("[data-form]"); if (!form) return; e.preventDefault(); const formName = form.dataset.form; if (formName === "login" || formName === "signup") { const username = form.username.value.trim(); const password = form.password.value; const result = formName === "login" ? Auth.login(username, password) : Auth.signup(username, password); if (!result.ok) { this.state.authError = result.message; this.renderRoot(); } else { this.state.authError = ""; this.renderRoot(); } } if (formName === "review") { const id = form.dataset.id; const text = form.querySelector("#review-text").value.trim(); if (this.state.draftRating === 0) { this.state.reviewError = "별점을 선택해주세요."; this.state.draftText = text; this.updateModal(); return; } if (text.length < 2) { this.state.reviewError = "리뷰 내용을 2자 이상 입력해주세요."; this.state.draftText = text; this.updateModal(); return; } Storage.addReview(id, { id: `rv-${Date.now()}`, user: Auth.getCurrentUser(), rating: this.state.draftRating, text, date: new Date().toISOString(), }); this.state.draftRating = 0; this.state.draftText = ""; this.state.reviewError = ""; this.updateModal(); this.updateGrid(); } }); // 입력 중에는 해당 요소만 상태에 반영 (전체 재렌더 금지 -> 포커스 유지) root.addEventListener("input", (e) => { if (e.target.id === "search-input") { this.state.query = e.target.value; this.updateGrid(); } if (e.target.id === "review-text") { this.state.draftText = e.target.value; } }); root.addEventListener("change", (e) => { if (e.target.id === "building-select") { this.state.buildingId = e.target.value; this.updateGrid(); } if (e.target.id === "sort-select") { this.state.sort = e.target.value; this.updateGrid(); } }); }, }; document.addEventListener("DOMContentLoaded", () => App.init());
